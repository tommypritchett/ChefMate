<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitcho AI — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFFBF5;
    --cream-dark: #F5EFE6;
    --cream-deeper: #E8DFD3;
    --warm-dark: #2D2520;
    --brown: #8B7355;
    --brown-light: #B8A68E;
    --orange: #D4652E;
    --orange-light: #FFF0E8;
    --emerald: #10b981;
    --emerald-light: #ecfdf5;
    --red: #E8445A;
    --red-light: #FEE2E2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--warm-dark);
    min-height: 100vh;
  }

  .header {
    background: var(--warm-dark);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    color: var(--cream);
    font-size: 24px;
    font-weight: 700;
  }

  .header .subtitle {
    color: var(--brown-light);
    font-size: 13px;
    margin-left: 12px;
  }

  .header-actions {
    display: flex;
    gap: 10px;
  }

  .btn {
    padding: 8px 18px;
    border-radius: 10px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .btn-primary { background: var(--orange); color: white; }
  .btn-emerald { background: var(--emerald); color: white; }
  .btn-outline { background: transparent; color: var(--cream); border: 1.5px solid rgba(255,251,245,0.25); }
  .btn-outline:hover { border-color: rgba(255,251,245,0.5); }
  .btn-small { padding: 5px 12px; font-size: 12px; border-radius: 8px; }
  .btn-approve { background: var(--emerald-light); color: var(--emerald); }
  .btn-reject { background: var(--red-light); color: var(--red); }
  .btn-publish { background: var(--orange); color: white; }
  .btn-ghost { background: transparent; color: var(--brown); border: 1px solid var(--cream-deeper); }
  .btn-ghost:hover { background: var(--cream-dark); }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px 24px 60px; }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: white;
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 1px 4px rgba(45,37,32,0.06);
  }

  .stat-card .label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--brown-light);
    margin-bottom: 6px;
  }

  .stat-card .value {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--warm-dark);
  }

  .stat-card .value.emerald { color: var(--emerald); }
  .stat-card .value.orange { color: var(--orange); }

  /* Sections */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
  }

  /* Filter tabs */
  .filter-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
  }

  .filter-tab {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--cream-deeper);
    background: white;
    font-size: 13px;
    font-weight: 600;
    color: var(--brown);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-tab.active {
    background: var(--warm-dark);
    color: var(--cream);
    border-color: var(--warm-dark);
  }

  .filter-tab:hover:not(.active) { border-color: var(--brown-light); }

  /* Concept cards */
  .concept-grid { display: flex; flex-direction: column; gap: 12px; }

  .concept-card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 1px 4px rgba(45,37,32,0.06);
    display: flex;
    align-items: center;
    gap: 16px;
    transition: box-shadow 0.15s;
  }

  .concept-card:hover { box-shadow: 0 4px 16px rgba(45,37,32,0.1); }

  .concept-icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: var(--emerald-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }

  .concept-info { flex: 1; min-width: 0; }

  .concept-name {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .concept-meta {
    font-size: 12px;
    color: var(--brown-light);
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .concept-meta span { display: inline-flex; align-items: center; gap: 3px; }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .badge-draft { background: var(--cream-dark); color: var(--brown); }
  .badge-approved { background: var(--emerald-light); color: var(--emerald); }
  .badge-published { background: var(--emerald); color: white; }
  .badge-rejected { background: var(--red-light); color: var(--red); }

  .concept-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(45,37,32,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.active { opacity: 1; pointer-events: auto; }

  .modal {
    background: white;
    border-radius: 20px;
    width: 520px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(45,37,32,0.25);
  }

  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--cream-deeper);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
  }

  .modal-close {
    width: 32px; height: 32px; border-radius: 8px; border: none;
    background: var(--cream-dark); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }

  .modal-body { padding: 24px; }

  .form-group { margin-bottom: 16px; }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--brown);
    margin-bottom: 6px;
  }

  .form-group input, .form-group select {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--cream-deeper);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: var(--cream);
    color: var(--warm-dark);
    transition: border-color 0.15s;
  }

  .form-group input:focus, .form-group select:focus {
    outline: none;
    border-color: var(--orange);
  }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--cream-deeper);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  /* Variants panel */
  .variants-panel {
    margin-top: 12px;
    padding: 16px;
    background: var(--cream);
    border-radius: 12px;
  }

  .variant-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--cream-deeper);
  }

  .variant-item:last-child { border-bottom: none; }

  .variant-type {
    font-weight: 600;
    font-size: 13px;
  }

  .variant-nutrition {
    font-size: 11px;
    color: var(--brown-light);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 20px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 13px;
    z-index: 300;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--emerald); color: white; }
  .toast.error { background: var(--red); color: white; }
  .toast.info { background: var(--warm-dark); color: var(--cream); }

  /* Loading */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
  }

  .spinner-dark {
    border-color: var(--cream-deeper);
    border-top-color: var(--orange);
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--brown-light);
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* Expanded concept detail */
  .concept-expanded {
    background: var(--cream);
    border-radius: 12px;
    margin-top: 12px;
    padding: 16px;
    display: none;
  }

  .concept-expanded.show { display: block; }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:baseline">
    <h1>Kitcho AI</h1>
    <span class="subtitle">Recipe Concept Admin</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="scanTrends()">
      <span>&#x1F50D;</span> Scan Trends
    </button>
    <button class="btn btn-outline" onclick="runWeekly()">
      <span>&#x26A1;</span> Run Weekly
    </button>
    <button class="btn btn-primary" onclick="showCreateModal()">
      + New Concept
    </button>
  </div>
</div>

<div class="container">
  <!-- Stats -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-card"><div class="label">Draft</div><div class="value" id="stat-draft">—</div></div>
    <div class="stat-card"><div class="label">Approved</div><div class="value emerald" id="stat-approved">—</div></div>
    <div class="stat-card"><div class="label">Published</div><div class="value emerald" id="stat-published">—</div></div>
    <div class="stat-card"><div class="label">Rejected</div><div class="value" id="stat-rejected">—</div></div>
    <div class="stat-card"><div class="label">Avg Variants</div><div class="value orange" id="stat-avg">—</div></div>
  </div>

  <!-- Filter tabs -->
  <div class="filter-tabs">
    <div class="filter-tab active" data-status="" onclick="filterBy(this, '')">All</div>
    <div class="filter-tab" data-status="draft" onclick="filterBy(this, 'draft')">Draft</div>
    <div class="filter-tab" data-status="approved" onclick="filterBy(this, 'approved')">Approved</div>
    <div class="filter-tab" data-status="published" onclick="filterBy(this, 'published')">Published</div>
    <div class="filter-tab" data-status="rejected" onclick="filterBy(this, 'rejected')">Rejected</div>
  </div>

  <!-- Concept list -->
  <div class="section-header">
    <div class="section-title">Concepts</div>
    <div id="concept-count" style="font-size:13px;color:var(--brown-light)"></div>
  </div>
  <div class="concept-grid" id="concept-list">
    <div class="empty-state">
      <div class="icon">&#x1F4E6;</div>
      <p>Loading concepts...</p>
    </div>
  </div>
</div>

<!-- Create Modal -->
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>New Recipe Concept</h2>
      <button class="modal-close" onclick="hideCreateModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Name *</label>
        <input type="text" id="input-name" placeholder="e.g., Healthy Big Mac Bowl">
      </div>
      <div class="form-group">
        <label>Tagline</label>
        <input type="text" id="input-tagline" placeholder="Short catchy tagline">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label>Category</label>
          <select id="input-category">
            <option value="">Select...</option>
            <option value="chicken">Chicken</option>
            <option value="mexican">Mexican</option>
            <option value="pasta">Pasta</option>
            <option value="burgers">Burgers</option>
            <option value="pizza">Pizza</option>
            <option value="bowls">Bowls</option>
            <option value="salad">Salad</option>
            <option value="breakfast">Breakfast</option>
            <option value="dessert">Dessert</option>
          </select>
        </div>
        <div class="form-group">
          <label>Cuisine Style</label>
          <select id="input-cuisine">
            <option value="">Select...</option>
            <option value="american">American</option>
            <option value="mexican">Mexican</option>
            <option value="italian">Italian</option>
            <option value="asian">Asian</option>
            <option value="mediterranean">Mediterranean</option>
            <option value="indian">Indian</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label>Protein Type</label>
          <select id="input-protein">
            <option value="">Any</option>
            <option value="chicken">Chicken</option>
            <option value="beef">Beef</option>
            <option value="pork">Pork</option>
            <option value="fish">Fish</option>
            <option value="tofu">Tofu</option>
            <option value="turkey">Turkey</option>
            <option value="none">No Meat</option>
          </select>
        </div>
        <div class="form-group">
          <label>Season</label>
          <select id="input-season">
            <option value="">Any</option>
            <option value="spring">Spring</option>
            <option value="summer">Summer</option>
            <option value="fall">Fall</option>
            <option value="winter">Winter</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="hideCreateModal()">Cancel</button>
      <button class="btn btn-primary" id="btn-create" onclick="createConcept()">Create Concept</button>
    </div>
  </div>
</div>

<!-- Variants Modal -->
<div class="modal-overlay" id="variants-modal">
  <div class="modal" style="width:600px">
    <div class="modal-header">
      <h2 id="variants-title">Variants</h2>
      <button class="modal-close" onclick="hideVariantsModal()">&times;</button>
    </div>
    <div class="modal-body" id="variants-body">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="hideVariantsModal()">Close</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = '';
let currentFilter = '';
let allConcepts = [];

// Helpers
function toast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${API}${path}`, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

// Stats
async function loadStats() {
  try {
    const data = await api('GET', '/api/admin/concepts/stats');
    document.getElementById('stat-draft').textContent = data.concepts.draft;
    document.getElementById('stat-approved').textContent = data.concepts.approved;
    document.getElementById('stat-published').textContent = data.concepts.published;
    document.getElementById('stat-rejected').textContent = data.concepts.rejected;
    document.getElementById('stat-avg').textContent = data.variants.avgPerConcept;
  } catch (e) {
    console.error('Stats error:', e);
  }
}

// Concepts
const CATEGORY_EMOJI = {
  chicken: '&#x1F357;', mexican: '&#x1F32E;', pasta: '&#x1F35D;', burgers: '&#x1F354;',
  pizza: '&#x1F355;', bowls: '&#x1F958;', salad: '&#x1F957;', breakfast: '&#x1F95E;',
  dessert: '&#x1F370;', sides: '&#x1F966;', default: '&#x1F37D;&#xFE0F;',
};

function getEmoji(cat) {
  return CATEGORY_EMOJI[cat] || CATEGORY_EMOJI.default;
}

function getBadgeClass(status) {
  return `badge badge-${status}`;
}

function renderActions(concept) {
  const s = concept.status;
  let html = '';
  html += `<button class="btn btn-small btn-ghost" onclick="viewVariants('${concept.id}', '${concept.name.replace(/'/g, "\\'")}')">Variants (${concept._count.variants})</button>`;
  html += `<button class="btn btn-small btn-emerald" onclick="generateVariants('${concept.id}')">Generate</button>`;

  if (s === 'draft') {
    html += `<button class="btn btn-small btn-approve" onclick="approveConcept('${concept.id}')">Approve</button>`;
    html += `<button class="btn btn-small btn-reject" onclick="rejectConcept('${concept.id}')">Reject</button>`;
  } else if (s === 'approved') {
    html += `<button class="btn btn-small btn-publish" onclick="publishConcept('${concept.id}')">Publish</button>`;
    html += `<button class="btn btn-small btn-reject" onclick="rejectConcept('${concept.id}')">Reject</button>`;
  } else if (s === 'rejected') {
    html += `<button class="btn btn-small btn-approve" onclick="approveConcept('${concept.id}')">Re-approve</button>`;
  }

  return html;
}

function renderConcepts(concepts) {
  const el = document.getElementById('concept-list');
  document.getElementById('concept-count').textContent = `${concepts.length} concept${concepts.length !== 1 ? 's' : ''}`;

  if (concepts.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="icon">&#x1F4AD;</div><p>No concepts found. Create one or scan for trends!</p></div>`;
    return;
  }

  el.innerHTML = concepts.map(c => {
    const date = new Date(c.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    return `<div class="concept-card">
      <div class="concept-icon">${getEmoji(c.category)}</div>
      <div class="concept-info">
        <div class="concept-name">${c.name}</div>
        <div class="concept-meta">
          <span class="${getBadgeClass(c.status)}">${c.status}</span>
          ${c.category ? `<span>${c.category}</span>` : ''}
          ${c.trendSource ? `<span>via ${c.trendSource}</span>` : ''}
          <span>${date}</span>
          <span>${c._count.variants} variant${c._count.variants !== 1 ? 's' : ''}</span>
        </div>
      </div>
      <div class="concept-actions">${renderActions(c)}</div>
    </div>`;
  }).join('');
}

async function loadConcepts() {
  try {
    const params = currentFilter ? `?status=${currentFilter}` : '';
    const data = await api('GET', `/api/admin/concepts${params}`);
    allConcepts = data.concepts;
    renderConcepts(allConcepts);
  } catch (e) {
    console.error('Load error:', e);
    document.getElementById('concept-list').innerHTML = `<div class="empty-state"><div class="icon">&#x26A0;&#xFE0F;</div><p>Failed to load: ${e.message}</p></div>`;
  }
}

function filterBy(el, status) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentFilter = status;
  loadConcepts();
}

// Actions
async function approveConcept(id) {
  try {
    await api('PUT', `/api/admin/concepts/${id}/approve`);
    toast('Concept approved!', 'success');
    loadConcepts();
    loadStats();
  } catch (e) { toast(e.message, 'error'); }
}

async function rejectConcept(id) {
  const notes = prompt('Rejection reason (optional):');
  try {
    await api('PUT', `/api/admin/concepts/${id}/reject`, { notes });
    toast('Concept rejected', 'info');
    loadConcepts();
    loadStats();
  } catch (e) { toast(e.message, 'error'); }
}

async function publishConcept(id) {
  try {
    await api('PUT', `/api/admin/concepts/${id}/publish`);
    toast('Concept published!', 'success');
    loadConcepts();
    loadStats();
  } catch (e) { toast(e.message, 'error'); }
}

async function generateVariants(id) {
  toast('Generating variants... this may take 30-60s', 'info');
  try {
    const data = await api('POST', `/api/admin/concepts/${id}/generate`);
    toast(`Generated ${data.created} variants!`, 'success');
    if (data.warnings?.length) {
      console.warn('Generation warnings:', data.warnings);
    }
    loadConcepts();
    loadStats();
  } catch (e) { toast(e.message, 'error'); }
}

// Variants modal
async function viewVariants(conceptId, conceptName) {
  document.getElementById('variants-title').textContent = `Variants — ${conceptName}`;
  document.getElementById('variants-body').innerHTML = '<div style="text-align:center;padding:24px"><div class="spinner spinner-dark"></div></div>';
  document.getElementById('variants-modal').classList.add('active');

  try {
    const data = await api('GET', `/api/admin/concepts/${conceptId}/variants`);
    const variants = data.variants;

    if (variants.length === 0) {
      document.getElementById('variants-body').innerHTML = '<div class="empty-state"><p>No variants yet. Click "Generate" to create them.</p></div>';
      return;
    }

    document.getElementById('variants-body').innerHTML = variants.map(v => {
      let nutrition = '';
      try {
        const n = JSON.parse(v.nutrition);
        nutrition = `${n.calories} cal &middot; ${n.protein}g P &middot; ${n.carbs}g C &middot; ${n.fat}g F`;
      } catch {}

      const tags = v.dietaryTags ? JSON.parse(v.dietaryTags) : [];
      const tagHtml = tags.map(t => `<span class="badge badge-draft" style="margin-right:4px">${t}</span>`).join('');

      let actionHtml = '';
      if (v.status === 'draft') {
        actionHtml = `<button class="btn btn-small btn-approve" onclick="approveVariant('${v.id}')">Approve</button>
                      <button class="btn btn-small btn-reject" onclick="rejectVariant('${v.id}')">Reject</button>`;
      }

      return `<div class="variant-item">
        <div>
          <div class="variant-type">${v.title} <span class="${getBadgeClass(v.status)}" style="margin-left:8px">${v.status}</span>${v.isDefault ? ' <span class="badge badge-approved" style="margin-left:4px">default</span>' : ''}</div>
          <div class="variant-nutrition">${v.variantType} &middot; ${nutrition}</div>
          <div style="margin-top:4px">${tagHtml}</div>
        </div>
        <div style="display:flex;gap:6px">${actionHtml}</div>
      </div>`;
    }).join('');
  } catch (e) {
    document.getElementById('variants-body').innerHTML = `<div class="empty-state"><p>Error: ${e.message}</p></div>`;
  }
}

function hideVariantsModal() {
  document.getElementById('variants-modal').classList.remove('active');
}

async function approveVariant(id) {
  try {
    await api('PUT', `/api/admin/variants/${id}/approve`);
    toast('Variant approved!', 'success');
    // Refresh the modal — find concept id from the list
    hideVariantsModal();
    loadConcepts();
  } catch (e) { toast(e.message, 'error'); }
}

async function rejectVariant(id) {
  try {
    await api('PUT', `/api/admin/variants/${id}/reject`);
    toast('Variant rejected', 'info');
    hideVariantsModal();
    loadConcepts();
  } catch (e) { toast(e.message, 'error'); }
}

// Create modal
function showCreateModal() {
  document.getElementById('create-modal').classList.add('active');
  document.getElementById('input-name').focus();
}

function hideCreateModal() {
  document.getElementById('create-modal').classList.remove('active');
}

async function createConcept() {
  const name = document.getElementById('input-name').value.trim();
  if (!name) { toast('Name is required', 'error'); return; }

  const body = {
    name,
    tagline: document.getElementById('input-tagline').value.trim() || undefined,
    category: document.getElementById('input-category').value || undefined,
    cuisineStyle: document.getElementById('input-cuisine').value || undefined,
    proteinType: document.getElementById('input-protein').value || undefined,
    season: document.getElementById('input-season').value || undefined,
  };

  try {
    await api('POST', '/api/admin/concepts', body);
    toast('Concept created!', 'success');
    hideCreateModal();
    // Clear form
    document.getElementById('input-name').value = '';
    document.getElementById('input-tagline').value = '';
    document.getElementById('input-category').value = '';
    document.getElementById('input-cuisine').value = '';
    document.getElementById('input-protein').value = '';
    document.getElementById('input-season').value = '';
    loadConcepts();
    loadStats();
  } catch (e) { toast(e.message, 'error'); }
}

// Trend scanning
async function scanTrends() {
  toast('Scanning for trends... this may take 15-30s', 'info');
  try {
    const data = await api('POST', '/api/admin/concepts/scan-trends');
    toast(`Found ${data.trends.length} new trends!`, 'success');
    loadConcepts();
    loadStats();
  } catch (e) { toast(e.message, 'error'); }
}

async function runWeekly() {
  toast('Weekly generation started in background', 'info');
  try {
    await api('POST', '/api/admin/concepts/run-weekly');
    // This runs async, poll after a delay
    setTimeout(() => { loadConcepts(); loadStats(); }, 5000);
  } catch (e) { toast(e.message, 'error'); }
}

// Init
loadStats();
loadConcepts();
</script>
</body>
</html>
