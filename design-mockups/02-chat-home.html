<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitcho AI - Chat Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .phone-frame {
            width: 390px;
            height: 844px;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            height: 44px;
            background: #10b981;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            padding-top: 8px;
            font-size: 15px;
            font-weight: 600;
            color: white;
        }

        .header {
            background: #10b981;
            color: white;
            padding: 16px 20px 20px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .icon-btn:active {
            background: rgba(255, 255, 255, 0.3);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            background: #f9fafb;
        }

        .welcome-card {
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 24px;
        }

        .welcome-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .welcome-title {
            font-size: 24px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 8px;
        }

        .welcome-subtitle {
            font-size: 16px;
            color: #6b7280;
            line-height: 1.5;
        }

        .quick-prompts {
            margin-top: 24px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 12px;
            padding-left: 4px;
        }

        .prompt-btn {
            width: 100%;
            padding: 16px 20px;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 16px;
            color: #374151;
            text-align: left;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .prompt-btn:active {
            border-color: #10b981;
            background: #ecfdf5;
            transform: scale(0.98);
        }

        .prompt-icon {
            width: 40px;
            height: 40px;
            background: #f0fdf4;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .prompt-text {
            flex: 1;
            font-weight: 500;
        }

        .chat-input-container {
            padding: 16px 20px;
            padding-bottom: 32px;
            background: white;
            border-top: 1px solid #e5e7eb;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            height: 48px;
            padding: 0 16px;
            font-size: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 24px;
            background: #f9fafb;
            outline: none;
            transition: all 0.2s;
        }

        .chat-input:focus {
            border-color: #10b981;
            background: white;
        }

        .mic-btn {
            width: 48px;
            height: 48px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .mic-btn:active {
            background: #059669;
            transform: scale(0.95);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: #fef3c7;
            color: #92400e;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <div>9:41</div>
            <div style="display: flex; gap: 5px;">
                <span>📶</span>
                <span>📡</span>
                <span>🔋</span>
            </div>
        </div>

        <div class="header">
            <div class="header-top">
                <h1 class="header-title">Kitcho AI</h1>
                <div class="header-actions">
                    <div class="icon-btn">📜</div>
                    <div class="icon-btn">➕</div>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="welcome-card">
                <div class="welcome-icon">🍳</div>
                <h2 class="welcome-title">What's cooking?</h2>
                <p class="welcome-subtitle">I'm your AI cooking companion. Ask me anything about recipes, meal planning, or nutrition!</p>
            </div>

            <div class="quick-prompts">
                <h3 class="section-title">Quick Start</h3>

                <button class="prompt-btn">
                    <div class="prompt-icon">🍽️</div>
                    <div class="prompt-text">What can I cook tonight?</div>
                </button>

                <button class="prompt-btn">
                    <div class="prompt-icon">🥗</div>
                    <div class="prompt-text">High protein meals for the week
                        <span class="badge">GOAL</span>
                    </div>
                </button>

                <button class="prompt-btn">
                    <div class="prompt-icon">📦</div>
                    <div class="prompt-text">What's in my inventory?</div>
                </button>

                <button class="prompt-btn">
                    <div class="prompt-icon">🛒</div>
                    <div class="prompt-text">Budget meals under $30</div>
                </button>

                <button class="prompt-btn">
                    <div class="prompt-icon">⏱️</div>
                    <div class="prompt-text">Quick 30-minute dinners</div>
                </button>
            </div>
        </div>

        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <input type="text" class="chat-input" placeholder="Ask Kitcho anything...">
                <div class="mic-btn">🎤</div>
            </div>
        </div>
    </div>
</body>
</html>
