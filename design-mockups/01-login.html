<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitcho AI - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .phone-frame {
            width: 390px;
            height: 844px;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
        }

        .status-bar {
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            padding-top: 8px;
            font-size: 15px;
            font-weight: 600;
        }

        .status-time { color: #000; }
        .status-icons { display: flex; gap: 5px; }

        .login-container {
            padding: 40px 32px;
            height: calc(100% - 44px);
            display: flex;
            flex-direction: column;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 48px;
            margin-top: 40px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 24px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
        }

        .app-title {
            font-size: 36px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .app-subtitle {
            font-size: 17px;
            color: #6b7280;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            height: 56px;
            padding: 0 16px;
            font-size: 17px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            background: #f9fafb;
            transition: all 0.3s;
            outline: none;
        }

        .form-input:focus {
            border-color: #10b981;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .forgot-password {
            text-align: right;
            margin-top: 12px;
        }

        .forgot-link {
            color: #10b981;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
        }

        .sign-in-btn {
            width: 100%;
            height: 56px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            font-size: 17px;
            font-weight: 600;
            border: none;
            border-radius: 16px;
            margin-top: 24px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
            transition: all 0.3s;
        }

        .sign-in-btn:active {
            transform: scale(0.98);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 32px 0;
            color: #9ca3af;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            padding: 0 16px;
        }

        .sign-up-section {
            text-align: center;
            margin-top: auto;
            padding-bottom: 20px;
        }

        .sign-up-text {
            color: #6b7280;
            font-size: 15px;
        }

        .sign-up-link {
            color: #10b981;
            font-weight: 600;
            text-decoration: none;
            margin-left: 4px;
        }

        .feature-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #ecfdf5;
            border-radius: 20px;
            margin: 4px;
            font-size: 14px;
            color: #059669;
            font-weight: 500;
        }

        .features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 24px 0;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <div class="status-time">9:41</div>
            <div class="status-icons">
                <span>📶</span>
                <span>📡</span>
                <span>🔋</span>
            </div>
        </div>

        <div class="login-container">
            <div class="logo-section">
                <div class="logo-icon">🍳</div>
                <h1 class="app-title">Kitcho AI</h1>
                <p class="app-subtitle">Your Smart Cooking Companion</p>
            </div>

            <div class="features">
                <span class="feature-badge">✨ AI Chef Assistant</span>
                <span class="feature-badge">🥗 Meal Planning</span>
                <span class="feature-badge">🛒 Smart Shopping</span>
            </div>

            <form>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" placeholder="you@example.com" value="">
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" placeholder="••••••••" value="">
                </div>

                <div class="forgot-password">
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="sign-in-btn">Sign In</button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <div class="sign-up-section">
                <span class="sign-up-text">Don't have an account?</span>
                <a href="#" class="sign-up-link">Sign Up</a>
            </div>
        </div>
    </div>
</body>
</html>
